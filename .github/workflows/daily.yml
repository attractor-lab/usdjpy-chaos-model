name: Daily USD/JPY Update

on:
  # schedule:
    # 0:30 UTC = 9:30 JST (yfinance前日終値の反映が9:00 JST頃のため、その後に実行)
    # 火〜土に実行することで月〜金の前日終値を取得
    # - cron: '30 0 * * 2-6'
  workflow_dispatch:  # 手動実行も可能
    inputs:
      realtime:
        description: 'LIVEモード（現在の市場価格を取得して本日データとして追加）'
        required: false
        default: false
        type: boolean
      price:
        description: '仮定始値シナリオ（例: 161.50）。入力すると指定価格でLIVE予測。空欄=無効'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model (public build)
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: |
          PRICE="${{ github.event.inputs.price }}"
          if [ -n "$PRICE" ]; then
            python upgrade.py --price "$PRICE"
          elif [ "${{ github.event.inputs.realtime }}" = "true" ]; then
            python upgrade.py --realtime
          else
            python upgrade.py
          fi

      - name: Commit and push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
