name: Daily Model Update

on:
#  schedule:
    # 日本時間：毎週月〜金の朝9:07（UTC 0:07）に自動実行
#    - cron: '7 0 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install numpy scipy yfinance pandas cot-reports

      - name: Run model
        run: python update.py

      - name: Commit and push updated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git add docs/index_public.html || true
          git diff --staged --quiet || git commit -m "chore: update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
