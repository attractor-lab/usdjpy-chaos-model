name: Daily USD/JPY Update

on:
  # schedule:
    # 23:00 UTC = 8:00 JST (夏時間: NY close ~22:00 UTC の1時間後)
    # 冬時間は NY close が 23:00 UTC なので直後に相当
    # - cron: '0 23 * * 1-5'
  workflow_dispatch:  # 手動実行も可能
    inputs:
      realtime:
        description: 'リアルタイムモード（NYクローズ直前 5:45頃に実行する場合はON）'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run model (public build)
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.realtime }}" = "true" ]; then
            python upgrade.py --realtime
          else
            python upgrade.py
          fi

      - name: Commit and push docs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "chore: daily update $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
